<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minhas Finanças</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        /* Variáveis de Cores - Estética Futurista Roxo/Azul */
        :root {
            --bg-color: #0b0c10;
            --primary: #6a11cb;
            --secondary: #2575fc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
            --text-muted: #a0a5b1;
            --danger: #ff4757;
            --success: #2ed573;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(106, 17, 203, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(37, 117, 252, 0.15), transparent 25%);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* ----- TELA DE LOGIN ----- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            z-index: 1000;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }

        .login-card h1 {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .login-card p { color: var(--text-muted); margin-bottom: 30px; }

        .input-glass {
            width: 100%; padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border); border-radius: 12px;
            color: white; font-size: 1rem; outline: none;
            transition: all 0.3s ease; margin-bottom: 20px;
        }

        .input-glass:focus {
            border-color: var(--secondary); box-shadow: 0 0 15px rgba(37, 117, 252, 0.3);
        }

        .btn-gradient {
            width: 100%; padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none; border-radius: 12px; color: white;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(106, 17, 203, 0.4); transition: transform 0.2s;
        }
        .btn-gradient:active { transform: scale(0.98); }

        /* ----- APP PRINCIPAL ----- */
        #app-screen {
            display: none;
            padding: 20px 20px 100px 20px;
            max-width: 600px; margin: 0 auto;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-top: 10px;
        }

        /* Estilos do Perfil no Header */
        .profile-header {
            display: flex; align-items: center; gap: 12px;
        }
        .profile-img-mini {
            width: 40px; height: 40px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--primary);
            background-color: rgba(255,255,255,0.1);
        }

        .greeting { font-size: 1.2rem; font-weight: 500; color: var(--text-muted); }
        .greeting span { color: white; font-weight: bold; }

        .balance-card {
            padding: 25px; text-align: center; margin-bottom: 30px;
            background: linear-gradient(135deg, rgba(106,17,203,0.2) 0%, rgba(37,117,252,0.2) 100%);
        }
        .balance-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .balance-card h2 { font-size: 2.5rem; font-weight: bold; }

        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        .form-group label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; margin-left: 5px; }

        select.input-glass { appearance: none; background-color: rgba(255, 255, 255, 0.02); }
        select.input-glass option { background-color: var(--bg-color); color: white; }

        .section-title { font-size: 1.1rem; margin-bottom: 15px; margin-top: 10px; }
        .item-list { list-style: none; }
        
        .item-card { padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .item-info h4 { font-size: 1rem; margin-bottom: 4px; }
        .item-info p { font-size: 0.8rem; color: var(--text-muted); }
        .item-value-area { text-align: right; }
        .item-value { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; color: var(--text-light); }
        .item-value.red { color: var(--danger); }
        
        .btn-small { background: rgba(255, 255, 255, 0.1); border: none; color: white; padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; }
        .btn-small.pay { background: rgba(46, 213, 115, 0.2); color: var(--success); }
        .btn-small.del { background: rgba(255, 71, 87, 0.2); color: var(--danger); margin-left: 5px;}

        .notes-area { width: 100%; height: 50vh; background: transparent; border: none; color: white; font-size: 1.1rem; line-height: 1.6; resize: none; outline: none; }

        /* ----- BARRA INFERIOR ----- */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; display: flex; justify-content: space-around;
            align-items: center; padding: 10px 15px; border-radius: 30px; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); cursor: pointer; transition: 0.3s; padding: 10px; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 4px; transition: 0.3s; }
        .nav-item span { font-size: 0.7rem; font-weight: 500; }
        .nav-item.active { color: var(--secondary); }
        .nav-item.active svg { transform: translateY(-2px); filter: drop-shadow(0 2px 5px rgba(37, 117, 252, 0.5)); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ----- ESTILOS DA ABA DE CONFIGURAÇÕES ----- */
        .config-avatar-wrapper {
            position: relative; width: 120px; height: 120px; margin: 0 auto 30px; cursor: pointer;
        }
        .config-avatar {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--primary); background-color: rgba(255,255,255,0.05);
            box-shadow: 0 4px 15px rgba(106, 17, 203, 0.4);
        }
        .edit-badge {
            position: absolute; bottom: 0; right: 0; background: var(--secondary);
            padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--bg-color);
        }

        /* Modal de Recorte (Crop) */
        #crop-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 12, 16, 0.95); backdrop-filter: blur(10px); z-index: 2000;
            flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .crop-container {
            width: 100%; max-width: 400px; height: 50vh; background: #000; margin-bottom: 20px; border-radius: 12px; overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card glass">
            <h1>Finanças</h1>
            <p>Seu controle financeiro pessoal</p>
            <input type="text" id="username-input" class="input-glass" placeholder="Como quer ser chamado?">
            <button class="btn-gradient" onclick="fazerLogin()">Entrar no App</button>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <div class="profile-header">
                <img id="header-avatar" src="" class="profile-img-mini" alt="Perfil">
                <div class="greeting">Olá, <span id="display-name"></span> 👋</div>
            </div>
            <button class="btn-small" onclick="sair()" style="background: transparent; color: var(--text-muted);">Sair</button>
        </header>

        <div class="balance-card glass" id="painel-saldo">
            <p>Total de Gastos</p>
            <h2>R$ <span id="header-total">0.00</span></h2>
        </div>

        <section id="tab-gastos" class="tab-content active">
            <div class="glass" style="padding: 20px; margin-bottom: 20px;">
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label>Descrição</label>
                        <input type="text" id="gasto-desc" class="input-glass" placeholder="Ex: Almoço">
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="gasto-valor" class="input-glass" placeholder="0.00" step="0.01">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Método</label>
                        <select id="gasto-metodo" class="input-glass">
                            <option value="Pix">Pix</option>
                            <option value="Débito">Débito</option>
                            <option value="Crédito">Crédito</option>
                            <option value="Dinheiro">Dinheiro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="gasto-categoria" class="input-glass">
                            <option value="Mercado">Mercado</option>
                            <option value="Lazer">Lazer</option>
                            <option value="Veículo">Veículo</option>
                            <option value="Beleza">Beleza</option>
                            <option value="Farmácia">Farmácia</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                </div>
                <button class="btn-gradient" onclick="addGasto()">+ Adicionar Gasto</button>
            </div>

            <h3 class="section-title">Últimos Registros</h3>
            <ul class="item-list" id="lista-gastos"></ul>
        </section>

        <section id="tab-parcelas" class="tab-content">
            <div class="glass" style="padding: 20px; margin-bottom: 20px;">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>O que você parcelou?</label>
                    <input type="text" id="parc-desc" class="input-glass" placeholder="Ex: iPhone, Financiamento">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Valor Total (R$)</label>
                        <input type="number" id="parc-valor-total" class="input-glass" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Nº de Parcelas</label>
                        <input type="number" id="parc-qtd" class="input-glass" placeholder="Ex: 12">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Parcelas Pagas</label>
                        <input type="number" id="parc-pagas" class="input-glass" value="0">
                    </div>
                    <div class="form-group">
                        <label>Dia do Vencimento</label>
                        <input type="number" id="parc-venc" class="input-glass" placeholder="Ex: 10">
                    </div>
                </div>
                <button class="btn-gradient" onclick="addParcelamento()">+ Registrar Parcelamento</button>
            </div>

            <h3 class="section-title">Suas Dívidas</h3>
            <ul class="item-list" id="lista-parcelas"></ul>
        </section>

        <section id="tab-notas" class="tab-content">
            <div class="glass" style="padding: 20px;">
                <h3 class="section-title" style="margin-top: 0;">Despesas Fixas Mensais</h3>
                <textarea class="notes-area" id="bloco-notas" placeholder="Escreva aqui seus gastos fixos mensais...&#10;&#10;Exemplo
